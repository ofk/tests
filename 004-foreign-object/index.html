<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><title>004</title><meta name="viewport" content="width=device-width, initial-scale=1"></head><body><h1>004</h1><p>Different drawing positions of canvas in svg for chrome and safari.</p><svg width="400" height="200" style="background-color:grey"><g transform="translate(100 50)"><foreignObject x="0" y="0" width="200" height="100"><canvas width="200" height="100"></canvas></foreignObject></g></svg><script>var e=document.querySelector("canvas"),t=e.getContext("2d");t.fillStyle="rgba(0,0,255,0.5)",t.fillRect(0,0,e.width,e.height);</script></body></html>
